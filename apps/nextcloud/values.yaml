nextcloud:
  nextcloud:
    host: nextcloud.shivpatel.xyz
    existingSecret:
      enabled: true
      secretName: nextcloud-secret
      usernameKey: nextcloud-username
      passwordKey: nextcloud-password
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  persistence:
    enabled: true
    # using default storageclass (longhorn) for core files
  nextcloudData:
    enabled: true
    existingClaim: nextcloud-nfs
  startupProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 120
    successThreshold: 1
