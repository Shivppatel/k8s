apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-observability-contract
  namespace: observability
data:
  contract.yaml: |
    collectorUrl: https://rum.shivpatel.xyz/collect
    environment: homelab
    requiredFields:
      - collectorUrl
      - appName
      - appVersion
      - environment
    optionalFields:
      - user
      - session
      - release
    instrumentedApps:
      - homepage
    viewing:
      endpointRootBehavior: "https://rum.shivpatel.xyz returns 404 on / because it is an ingest endpoint."
      logs: "Use Grafana Explore or Logs Drilldown with {job=\"frontend-rum\"} | json."
      traces: "Use Grafana Explore or Traces Drilldown with the Tempo datasource."
      ui: "There is no separate Faro UI in this OSS setup; browser telemetry is viewed via Loki and Tempo."
    unsupportedApps:
      - argocd
      - grafana
      - longhorn
      - prometheus
      - pyroscope
      - traefik-dashboard
      - uptime-kuma
