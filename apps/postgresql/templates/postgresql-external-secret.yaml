# App role credentials are pulled from Vault into Kubernetes and reconciled by
# CNPG. The reserved postgres superuser secret is generated by CNPG and pushed
# back to Vault so the operator stays the single owner of that password.
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: postgresql-superuser
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: "1h"
  updatePolicy: Replace
  secretStoreRefs:
    - name: vault-backend
      kind: ClusterSecretStore
  selector:
    secret:
      name: postgresql-superuser
  data:
    - match:
        secretKey: username
        remoteRef:
          remoteKey: postgresql/superuser
          property: username
    - match:
        secretKey: password
        remoteRef:
          remoteKey: postgresql/superuser
          property: password
---
# Secret for CNPG managed role - immich
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-db-secret
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: immich-db-secret
    creationPolicy: Owner
    template:
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/postgresql/immich
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/postgresql/immich
        property: password
---
