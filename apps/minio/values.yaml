minio:
  mode: standalone
  statefulset:
    replicaCount: 1
  auth:
    existingSecret: "minio-root-credentials"
    rootUserSecretKey: "root-user"
    rootPasswordSecretKey: "root-password"
  image:
    registry: docker.io
    repository: bitnamilegacy/minio
  persistence:
    enabled: true
    existingClaim: minio-nfs
    accessModes:
      - ReadWriteOnce
  # The NAS NFS export maps MinIO data to 977:988; matching it keeps S3
  # listings consistent with objects written on disk.
  podSecurityContext:
    fsGroup: 988
    supplementalGroups:
      - 988
  containerSecurityContext:
    runAsUser: 977
    runAsGroup: 988
  console:
    image:
      registry: docker.io
      repository: bitnamilegacy/minio-object-browser
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
