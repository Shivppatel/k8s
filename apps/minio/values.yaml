minio:
  mode: standalone
  statefulset:
    replicaCount: 1
  auth:
    existingSecret: "minio-root-credentials"
    rootUserSecretKey: "root-user"
    rootPasswordSecretKey: "root-password"
  image:
    registry: docker.io
    repository: bitnamilegacy/minio
  persistence:
    enabled: true
    existingClaim: minio-nfs
    accessModes:
      - ReadWriteOnce
  console:
    image:
      registry: docker.io
      repository: bitnamilegacy/minio-object-browser
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
