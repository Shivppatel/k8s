minio:
  mode: distributed
  statefulset:
    replicaCount: 3
    drivesPerNode: 2
    updateStrategy:
      type: OnDelete
  extraEnvVars:
    - name: MINIO_BROWSER
      value: "on"
  auth:
    existingSecret: "minio-root-credentials"
    rootUserSecretKey: "root-user"
    rootPasswordSecretKey: "root-password"
  image:
    registry: docker.io
    repository: bitnamilegacy/minio
  persistence:
    enabled: true
    storageClass: longhorn
    accessModes:
      - ReadWriteOnce
  service:
    ports:
      api: 9000
      console: 9001
  console:
    enabled: false
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
