apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    headerStyle: clean
    background:
        image: https://images.unsplash.com/photo-1604928141064-207cea6f571f?q=80&w=2728&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D
        blur: md
        saturate: 50
        brightness: 50
        opacity: 70
    theme: dark
    color: zinc
    providers:
      longhorn:
        url: http://longhorn-frontend.longhorn-system.svc.cluster.local
    quicklaunch:
        searchDescriptions: true
        hideInternetSearch: true
        showSearchSuggestions: true
        hideVisitURL: true
    hideVersion: true
    hideErrors: true
    statusStyle: "dot"
  custom.css: ""
  custom.js: |
    (() => {
      const config = {
        collectorUrl: "https://rum.shivpatel.xyz/collect",
        appName: "homepage",
        appVersion: '{{ .Chart.AppVersion | default "gitops" }}',
        environment: "homelab",
        unsupportedApps: [
          "argocd",
          "grafana",
          "longhorn",
          "prometheus",
          "pyroscope",
          "traefik-dashboard",
          "uptime-kuma"
        ]
      };

      window.HOMELAB_OBSERVABILITY = config;

      const loadScript = (src) =>
        new Promise((resolve, reject) => {
          const existing = document.querySelector(`script[src="${src}"]`);
          if (existing) {
            existing.addEventListener("load", resolve, { once: true });
            existing.addEventListener("error", reject, { once: true });
            return;
          }

          const script = document.createElement("script");
          script.async = true;
          script.src = src;
          script.addEventListener("load", resolve, { once: true });
          script.addEventListener("error", reject, { once: true });
          document.head.appendChild(script);
        });

      const initFrontendObservability = async () => {
        try {
          await loadScript("https://cdn.jsdelivr.net/npm/@grafana/faro-web-sdk@1.19.0/dist/bundle/faro-web-sdk.iife.js");
          await loadScript("https://cdn.jsdelivr.net/npm/@grafana/faro-web-tracing@1.19.0/dist/bundle/faro-web-tracing.iife.js");

          const sdk = window.GrafanaFaroWebSdk;
          if (!sdk?.initializeFaro) {
            return;
          }

          const instrumentations = sdk.getWebInstrumentations({
            captureConsole: true
          });

          if (window.GrafanaFaroWebTracing?.TracingInstrumentation) {
            instrumentations.push(
              new window.GrafanaFaroWebTracing.TracingInstrumentation({
                propagateTraceHeaderCorsUrls: [/^https:\/\/([a-z0-9-]+\.)?shivpatel\.xyz/i]
              })
            );
          }

          sdk.initializeFaro({
            app: {
              name: config.appName,
              version: config.appVersion,
              environment: config.environment
            },
            instrumentations,
            url: config.collectorUrl
          });
        } catch (error) {
          console.warn("Frontend observability failed to initialize", error);
        }
      };

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initFrontendObservability, { once: true });
      } else {
        initFrontendObservability();
      }
    })();
