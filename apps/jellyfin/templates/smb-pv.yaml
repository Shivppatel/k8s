{{- range $name, $share := .Values.smbShares }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-smb-{{ $name }}
  annotations:
    pv.kubernetes.io/provisioned-by: smb.csi.k8s.io
spec:
  capacity:
    storage: {{ $share.capacity | default "1Ti" }}
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - dir_mode=0555
    - file_mode=0444
    - uid=0
    - gid=0
  csi:
    driver: smb.csi.k8s.io
    volumeHandle: jellyfin-smb-{{ $name }}
    volumeAttributes:
      source: {{ $share.source | quote }}
    nodeStageSecretRef:
      name: jellyfin-smb-credentials
      namespace: {{ $.Release.Namespace }}
{{- end }}
