apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jellyfin-smb-credentials
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: jellyfin-smb-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/jellyfin
        property: smb-username
    - secretKey: password
      remoteRef:
        key: secret/data/jellyfin
        property: smb-password
